name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Backend on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_PORT || 22 }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e

            echo "Deploying backend..."
            cd "${{ secrets.BACKEND_PATH }}"

            BEFORE=$(git rev-parse HEAD)
            git pull --ff-only origin main
            AFTER=$(git rev-parse HEAD)

            if git diff --name-only "$BEFORE" "$AFTER" | grep -E '(^package.json$|^package-lock.json$)'; then
              echo "Package files changed. Installing production dependencies..."
              npm install --omit=dev
            else
              echo "No package changes. Skipping npm install."
            fi

            npx sequelize-cli db:migrate

            pm2 restart "${{ secrets.PM2_APP }}"
            pm2 save
            pm2 status

            echo "Backend deployment complete."
